drawer:
  logOutTitle:
    en: Sign in to start saving your chats
    ja: ログインしてチャットの保存を開始
    es: Inicia sesión para empezar a guardar tus chats
    fr: Connectez-vous pour commencer à enregistrer vos discussions
    de: Melden Sie sich an, um Ihre Chats zu speichern
    hi: अपनी चैट सहेजना शुरू करने के लिए साइन इन करें
    zh: 登录开始保存您的聊天记录
    ar: سجل الدخول لبدء حفظ دردشاتك
  logOutSubTitle:
    en: Once you're signed in, you can access your recent chats here.
    ja: ログインすると、最近のチャットにここからアクセスできます。
    es: Una vez que inicies sesión, podrás acceder a tus chats recientes aquí.
    fr: Une fois connecté, vous pourrez accéder à vos discussions récentes ici.
    de: Sobald Sie angemeldet sind, können Sie hier auf Ihre letzten Chats zugreifen.
    hi: साइन इन करने के बाद, आप यहां अपनी हालिया चैट देख सकते हैं।
    zh: 登录后，您可以在此处访问最近的聊天。
    ar: بمجرد تسجيل الدخول، يمكنك الوصول إلى دردشاتك الأخيرة هنا.

footer:
