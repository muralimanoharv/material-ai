feedbackSuccessMessage:
  en: Thank you! Your feedback helps make Agent better for everyone
  ja: ありがとうございます！あなたのフィードバックは、エージェントをより良くするのに役立ちます
  es: ¡Gracias! Tus comentarios ayudan a que el Agente sea mejor para todos
  fr: Merci ! Vos commentaires aident à améliorer l'Agent pour tout le monde
  de: Vielen Dank! Ihr Feedback hilft uns, den Agenten für alle besser zu machen
  hi: धन्यवाद! आपकी प्रतिक्रिया एजेंट को सभी के लिए बेहतर बनाने में मदद करती है
  zh: 谢谢！您的反馈有助于让代理变得更好
  ar: شكرًا لك! تساعد تعليقاتك في تحسين الوكيل للجميع

feedbackNegativeMessage:
  en: Thank you for helping improve Agent
  ja: エージェントの改善にご協力いただきありがとうございます
  es: Gracias por ayudar a mejorar al Agente
  fr: Merci de nous aider à améliorer l'Agent
  de: Vielen Dank für Ihre Hilfe bei der Verbesserung des Agenten
  hi: एजेंट को बेहतर बनाने में मदद करने के लिए धन्यवाद
  zh: 感谢您帮助改进代理
  ar: شكرًا لك على مساعدتنا في تحسين الوكيل
