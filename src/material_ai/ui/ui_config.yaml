            fr: N'a pas suivi les instructions
            de: Anweisungen nicht befolgt
            hi: निर्देशों का पालन नहीं किया
            zh: 未遵循指令
            ar: لم يتبع التعليمات
          - en: Offensive / Unsafe
            ja: 攻撃的または不安全
            es: Ofensivo / Inseguro
            fr: Offensant / Dangereux
            de: Beleidigend / Unsicher
            hi: अपमानजनक / असुरक्षित
            zh: 冒犯性 / 不安全
            ar: مسيء / غير آمن
          - en: Wrong language
            ja: 言語が正しくない
