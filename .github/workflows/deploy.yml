name: "Deploy to Cloud Run"

on:
  push:
    branches:
      - main

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  terraform-deploy:
    runs-on: ubuntu-latest
    env:
      UV_CACHE_DIR: /tmp/.uv-cache
    
    defaults:
      run:
        working-directory: ./scripts

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- 1. PYTHON & UV SETUP ---
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-suffix: "backend-deps"

      - name: Set up Python
        run: uv python install 3.13
        working-directory: .

      - name: Install Python Dependencies
        run: uv sync --frozen || uv sync
        working-directory: .

      # --- 2. NODE.JS SETUP ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./src/material_ai/ui/package-lock.json

      - name: Install Node dependencies
        working-directory: ./src/material_ai/ui
        run: npm ci

      # --- 3. BUILD PROJECT ---
      - name: Build Project
        run: |
          # Ensure .venv is in path if make build-ui requires it
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
          make build-ui
        working-directory: .

      # --- 4. GCP AUTHENTICATION ---
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'

      # --- 5. TERRAFORM DEPLOYMENT ---
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
          TF_VAR_region: "us-central1"
          TF_VAR_repo_name: "material-ai-crun-repository"
          TF_VAR_image_name: "material-ai"
          TF_VAR_service_name: "material-ai-crun"
          TF_VAR_sso_issuer: "google"
          TF_VAR_sso_client_id: ${{ secrets.SSO_CLIENT_ID }}
          TF_VAR_sso_client_secret: ${{ secrets.SSO_CLIENT_SECRET }}
          TF_VAR_sso_redirect_uri: ${{ secrets.SSO_REDIRECT_URI }}
          TF_VAR_sso_scope: "openid email profile"
          TF_VAR_sso_session_secret_key: ${{ secrets.SSO_SESSION_SECRET_KEY }}
          TF_VAR_config_path: "config.ini"
          TF_VAR_google_genai_use_vertexai: "true"
          TF_VAR_adk_session_db_url: "sqlite:///./my_agent_data.db"
        run: terraform apply -auto-approve