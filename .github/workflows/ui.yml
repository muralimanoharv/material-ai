jobs:
  find-ui-dirs:
    runs-on: ubuntu-latest
    outputs:
      dirs: ${{ steps.set-dirs.outputs.dirs }}
    steps:
      - uses: actions/checkout@v4
      - id: set-dirs
        run: |
          # Find directories and format as a JSON array for the matrix
          DIRS=$(find src/material_ai/ui src/material_ai/agents/*/ui -maxdepth 1 -name "package.json" -exec dirname {} \; | jq -R -s -c 'split("\n") | del(.[] | select(. == ""))')
          echo "dirs=$DIRS" >> $GITHUB_OUTPUT

  ui-quality-matrix:
    needs: find-ui-dirs
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ui_path: ${{ fromJson(needs.find-ui-dirs.outputs.dirs) }}
    defaults:
      run:
        working-directory: ${{ matrix.ui_path }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '${{ matrix.ui_path }}/package-lock.json'
      
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint